<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#618985;--teal-l:#e8f0ef;--teal-d:#4a6e6b;--mauve:#B75D69;--mauve-l:#f5e8eb;--mauve-d:#8f4652;--brown:#414535;--silk-l:#f7f0ec;--bg:#fff;--bg2:#f8f6f4;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--text2:#666;--text3:#999;}
body{background:#f0ebe6;padding:1.5rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);}
.db{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}
.row{display:grid;gap:12px;}
.r2{grid-template-columns:1fr 1fr;}
.r3{grid-template-columns:2fr 1fr;}
.col{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;}
.card-teal{background:var(--teal);border-color:var(--teal);}
.card-teal .lbl{color:rgba(255,255,255,.75);}
.card-teal .big,.card-teal .wsub{color:#fff;}
.rain{background:rgba(255,255,255,.2);color:#fff;font-size:11px;padding:3px 8px;border-radius:99px;display:inline-block;margin-top:6px;}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;color:var(--text3);}
.accent{width:28px;height:3px;background:var(--mauve);border-radius:99px;margin-bottom:10px;}
.big{font-size:26px;font-weight:500;}
.wsub{font-size:13px;color:var(--text2);margin-top:2px;}
.date-big{font-size:15px;font-weight:500;}
.date-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.prog-bg{background:var(--silk-l);border-radius:99px;height:4px;margin-top:8px;}
.prog-fill{background:var(--teal);height:4px;border-radius:99px;transition:width .3s;}
.prog-lbl{font-size:11px;color:var(--text3);margin-top:5px;}
.qt{font-size:13px;color:var(--text2);line-height:1.7;font-style:italic;}
.qa{font-size:11px;color:var(--mauve);margin-top:5px;}
.qbtn{font-size:11px;color:var(--mauve);background:none;border:none;cursor:pointer;margin-top:7px;padding:0;text-decoration:underline;}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.wk-nav{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;}
.wk-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s;}
.wk-btn:hover{background:var(--mauve-l);}
.wk-btn.active{background:var(--mauve);border-color:var(--mauve);}
.wk-btn.istoday:not(.active){border-color:var(--teal);}
.wdn{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;}
.wk-btn.active .wdn,.wk-btn.active .wdnum{color:#fff;}
.wk-btn.istoday:not(.active) .wdn{color:var(--teal);}
.wdnum{font-size:13px;font-weight:500;color:var(--text);}
.wdot{width:4px;height:4px;border-radius:50%;background:var(--mauve);margin-top:2px;opacity:0;}
.wk-btn.has-data .wdot{opacity:1;}
.wk-btn.active .wdot{background:#fff;opacity:1;}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-item.carried{background:var(--silk-l);border-radius:8px;padding-left:6px;}
.cbadge{font-size:10px;color:var(--mauve);margin-left:4px;flex-shrink:0;}
.cb{width:15px;height:15px;border:0.5px solid var(--mauve);border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cb.done{background:var(--teal);border-color:var(--teal);}
.ck{width:8px;height:8px;display:none;}
.cb.done .ck{display:block;}
.tt{font-size:13px;color:var(--text);line-height:1.4;flex:1;}
.tt.done{color:var(--text3);text-decoration:line-through;}
.dx{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;}
.add-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.add-row input,.add-row select{flex:1;font-size:13px;padding:5px 8px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);}
.add-row button{font-size:12px;padding:5px 12px;border:0.5px solid var(--mauve);border-radius:8px;background:none;color:var(--mauve);cursor:pointer;}
.fslot{margin-bottom:6px;}
.frow{display:flex;align-items:center;gap:6px;}
.fnum{font-size:11px;color:var(--mauve);font-weight:600;min-width:14px;}
.finput{font-size:13px;color:var(--text);flex:1;outline:none;border:none;border-bottom:0.5px dashed var(--border);background:transparent;padding:3px 0;}
.finput::placeholder{color:var(--text3);}
.fbubb{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.fbub{display:inline-flex;align-items:center;gap:5px;background:var(--mauve-l);color:var(--mauve-d);font-size:12px;padding:4px 10px;border-radius:99px;cursor:pointer;}
.fbub.tachado{background:#e8e9e4;color:var(--text3);text-decoration:line-through;opacity:.6;}
.ev-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border);}
.ev-item:last-child{border-bottom:none;}
.ev-time{font-size:11px;color:var(--text3);min-width:60px;}
.ev-dot{width:6px;height:6px;border-radius:50%;background:var(--mauve);flex-shrink:0;}
.ev-title{font-size:13px;color:var(--text);flex:1;}
.ev-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0;}
.ev-empty{font-size:12px;color:var(--text3);padding:4px 0;}
.ev-div{height:0.5px;background:var(--border);margin:10px 0;}
.ev-lbl{font-size:11px;color:var(--text3);margin-bottom:6px;}
.dr-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.dr-lbl{font-size:11px;color:var(--text3);min-width:20px;}
.dr-sel,.t-sel{font-size:12px;padding:4px 8px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);cursor:pointer;}
.dr-sel{flex:1;}
.dvdr{height:0.5px;background:var(--border);margin:10px 0;}
.sh-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);}
.sh-item:last-child{border-bottom:none;}
.sh-text{font-size:13px;color:var(--text);flex:1;}
.sh-text.bought{color:var(--text3);text-decoration:line-through;}
.snote{font-size:10px;color:var(--text3);margin-top:6px;}
.ch{font-size:11px;color:var(--mauve);margin-bottom:6px;padding:4px 8px;background:var(--mauve-l);border-radius:8px;}
.wkov{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;}
.wcol{display:flex;flex-direction:column;gap:3px;}
.wovn{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
.wovn.today{color:var(--mauve);}
.wtag{font-size:10px;border-radius:4px;padding:2px 4px;line-height:1.4;}
.wwo{background:var(--teal-l);color:var(--teal-d);}
.whb{background:var(--silk-l);color:var(--brown);}
.wev{background:var(--mauve-l);color:var(--mauve-d);}
.wnt{background:var(--bg2);color:var(--text2);}
.wtsk{background:var(--bg2);color:var(--text2);font-size:10px;border-radius:4px;padding:2px 4px;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wtsk.done-task{text-decoration:line-through;opacity:.5;}
.gcal-btn{font-size:11px;padding:5px 10px;border:0.5px solid var(--teal);border-radius:8px;background:var(--teal-l);color:var(--teal-d);cursor:pointer;margin-top:6px;}
.gcal-btn.connected{background:var(--teal);color:#fff;border-color:var(--teal);}
.sync-badge{position:fixed;bottom:16px;right:16px;background:var(--teal);color:#fff;font-size:11px;padding:6px 12px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.sync-badge.show{opacity:1;}
@media(max-width:680px){
body{padding:.75rem;}
.r2,.r3{grid-template-columns:1fr;}
.col,.row,.db{gap:10px;}
.card{padding:.875rem 1rem;}
.big{font-size:22px;}
.date-big{font-size:14px;}
.wk-nav{gap:4px;}
.wk-btn{padding:5px 2px;}
.wdn{font-size:9px;}
.wdnum{font-size:12px;}
.wkov{gap:4px;}
.wtag,.wnt{font-size:9px;padding:2px 3px;}
.wovn{font-size:9px;}
.wtsk{font-size:9px;}
}

<body>
<div class="db">
  <div class="row r2">
    <div class="card card-teal">
      <div class="lbl">Mérida, Yucatán</div>
      <div class="big" id="temp">...</div>
      <div class="wsub" id="wdesc">Cargando...</div>

    <div class="card">
      <div class="lbl">Viendo</div>
      <div class="date-big" id="active-date"></div>
      <div class="date-sub" id="week-range"></div>
      <div class="prog-lbl" id="prog-lbl">Progreso: 0%</div>

  <div class="card">

  <div class="card">
    <div class="sec">Semana — click para navegar</div>
    <div class="wk-nav" id="wk-nav"></div>
  </div>

  <div class="row r2">
    <div class="card">
      <div class="sec">Pendientes</div>
      <div id="ch" class="ch" style="display:none"></div>
      <div id="task-list"></div>
      <div class="add-row">
        <input type="text" id="task-in" placeholder="Agregar pendiente...">
        <button onclick="addTask()">+ Agregar</button>
      </div>
    </div>
    <div class="col">
      <div class="card">
        <div class="sec">Enfoque del día</div>
        <div id="fbubb" class="fbubb"></div>
        <div class="fslot" id="fs1"><div class="frow"><div class="fnum">1</div><input class="finput" id="fi1" type="text" placeholder="Primer enfoque..." onblur="makeBubble(this,1)" onkeydown="if(event.key==='Enter')this.blur()"></div></div>
        <div class="fslot" id="fs2"><div class="frow"><div class="fnum">2</div><input class="finput" id="fi2" type="text" placeholder="Segundo enfoque..." onblur="makeBubble(this,2)" onkeydown="if(event.key==='Enter')this.blur()"></div></div>
        <div class="fslot" id="fs3"><div class="frow"><div class="fnum">3</div><input class="finput" id="fi3" type="text" placeholder="Tercer enfoque..." onblur="makeBubble(this,3)" onkeydown="if(event.key==='Enter')this.blur()"></div></div>
      </div>
      <div class="card">
        <div class="sec">Agenda</div>
        <div id="ev-list"></div>
        <div class="ev-div"></div>
        <div class="ev-lbl">Agregar evento:</div>
        <div class="add-row">
          <input type="date" id="ev-date" style="flex:none;font-size:12px;padding:5px 6px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);">
          <select class="t-sel" id="ev-h"><option>12</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option><option>11</option></select>
          <select class="t-sel" id="ev-m"><option>00</option><option>15</option><option>30</option><option>45</option></select>
          <select class="t-sel" id="ev-ap"><option>AM</option><option>PM</option></select>
          <input type="text" id="ev-title" placeholder="Evento...">
          <button onclick="addEv()">+</button>
        </div>
        <button class="gcal-btn" id="gcal-btn" onclick="handleGCal()">Conectar Google Calendar</button>
        <div class="snote" id="gcal-note"></div>
      </div>
      <div class="card">
        <div class="sec">Workout</div>
        <div class="dr-row"><div class="dr-lbl">1</div><select class="dr-sel" id="wo1" onchange="saveWorkout()"><option value="">—</option><option>Rest</option><option>Tennis</option><option>Pilates</option><option>Gym</option><option>E. Club</option><option>Swimming</option><option>Yoga</option><option>Box</option><option>Free Diving</option><option>Climbing</option><option>Otro</option></select></div>
        <div class="dr-row"><div class="dr-lbl">2</div><select class="dr-sel" id="wo2" onchange="saveWorkout()"><option value="">—</option><option>Rest</option><option>Tennis</option><option>Pilates</option><option>Gym</option><option>E. Club</option><option>Swimming</option><option>Yoga</option><option>Box</option><option>Free Diving</option><option>Climbing</option><option>Otro</option></select></div>
        <div class="dvdr"></div>
        <div class="sec">Hábito</div>
        <div class="dr-row"><div class="dr-lbl">1</div><select class="dr-sel" id="ha1" onchange="saveWorkout()"><option value="">—</option><option>Meditar</option><option>Leer</option><option>Stretching</option><option>Escribir</option><option>Otro</option></select></div>
        <div class="dr-row"><div class="dr-lbl">2</div><select class="dr-sel" id="ha2" onchange="saveWorkout()"><option value="">—</option><option>Meditar</option><option>Leer</option><option>Stretching</option><option>Escribir</option><option>Otro</option></select></div>
      </div>

  <div class="row r3">

      <div class="sec">Overview semanal</div>

      <div class="sec">Lista de compras</div>

        <button onclick="addSh()">+</button>

<div class="sync-badge" id="sync-badge">Guardado ✓</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- Google Identity -->
<script src="https://accounts.google.com/gsi/client" async></script>
<!-- ical.js -->
<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>

<script>
// ── CONSTANTS ──────────────────────────────
const DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const ICAL_URL='https://calendar.google.com/calendar/ical/f.perezserna%40gmail.com/private-00450f29f66ba6d8112c19e9435f65b5/basic.ics';
const WE={Tennis:'🎾','E. Club':'🏇',Swimming:'🏊‍♀️',Pilates:'🤸',Gym:'🏋️',Yoga:'🧘',Box:'🥊','Free Diving':'🤿',Climbing:'🧗',Rest:'😴',Otro:'✨'};
const HE={Meditar:'🧘',Leer:'📖',Stretching:'🤸',Escribir:'✍️',Otro:'✨'};
const DW={0:{wo1:'',wo2:'',ha1:'',ha2:''},1:{wo1:'',wo2:'',ha1:'',ha2:''},2:{wo1:'Tennis',wo2:'E. Club',ha1:'',ha2:''},3:{wo1:'Swimming',wo2:'',ha1:'',ha2:''},4:{wo1:'Tennis',wo2:'E. Club',ha1:'',ha2:''},5:{wo1:'Swimming',wo2:'',ha1:'',ha2:''},6:{wo1:'',wo2:'',ha1:'',ha2:''}};
const GCAL_ID='467685945788-t1on5u2jai4bjedbpm0m5119gkr1qnkh.apps.googleusercontent.com';

// ── STATE ──────────────────────────────────
const today=new Date();today.setHours(0,0,0,0);
let activeDate=new Date(today);
let weekDays=getWeekDays(today);
let weekData={tasks:[],focus:{},focusDone:{},focusDeleted:{},events:{},workout:{}};
let gcalEvts={};
let gcalToken=null;
let shoppingItems=[];
let tokenClient=null;
let db=null;
let unsub=null;
let fdone={1:false,2:false,3:false};

// ── HELPERS ────────────────────────────────
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getWeekDays(ref){
  const d=new Date(ref);const diff=d.getDay()===0?-6:1-d.getDay();d.setDate(d.getDate()+diff);
  const days=[];for(let i=0;i<7;i++){const x=new Date(d);x.setDate(d.getDate()+i);days.push(x);}return days;
}
function wid(){return'week_'+dk(weekDays[0]);}
function emoji(n,m){if(!n)return'';const e=m[n];return e?e+' '+n:n;}
function dayIdx(){return weekDays.findIndex(d=>dk(d)===dk(activeDate));}
function showSync(){const s=document.getElementById('sync-badge');s.classList.add('show');setTimeout(()=>s.classList.remove('show'),2000);}

// ── TASKS LOGIC ────────────────────────────
function tasksForDay(di){
  return(weekData.tasks||[]).filter(t=>{
    if(t.addedOnDay>di)return false;
    if(t.deletedOnDay!==undefined&&t.deletedOnDay<=di)return false;
    // Hide tasks done on a PREVIOUS day (not today)
    if(t.doneOnDay!==undefined&&t.doneOnDay<di)return false;
    return true;
  });
}
function focusForDay(di){
  // Each day has its own independent focus - no carry forward
  const focus=weekData.focus||{};
  const f=focus[di]||focus[String(di)]||{};
  return {
    1: f[1]||f['1']||'',
    2: f[2]||f['2']||'',
    3: f[3]||f['3']||''
  };
}
function dayEvts(di){return((weekData.events||{})[di])||[];}
function dayWo(di){
  if(weekData.workout&&weekData.workout[di]!==undefined)return weekData.workout[di];
  return DW[weekDays[di].getDay()]||{wo1:'',wo2:'',ha1:'',ha2:''};
}

// ── FIREBASE ───────────────────────────────
function initFirebase(){
  const cfg={apiKey:"AIzaSyBd-3kY7E_fOfhwrCP91I-SohUfBz4hkeo",authDomain:"mi-dashboard-25d4c.firebaseapp.com",projectId:"mi-dashboard-25d4c",storageBucket:"mi-dashboard-25d4c.firebasestorage.app",messagingSenderId:"768734489364",appId:"1:768734489364:web:65633f976f94575d9fb001"};
  firebase.initializeApp(cfg);
  db=firebase.firestore();
}

async function saveDB(){
  if(!db)return;
  try{await db.collection('fernanda').doc(wid()).set(weekData);showSync();}
  catch(e){console.error('Save error:',e);}
}

async function saveShoppingDB(){
  if(!db)return;
  try{await db.collection('fernanda').doc('shopping').set({items:shoppingItems});}
  catch(e){console.error('Shopping save error:',e);}
}

async function loadShoppingDB(){
  if(!db)return;
  try{
    const snap=await db.collection('fernanda').doc('shopping').get();
    if(snap.exists){
      shoppingItems=(snap.data().items||[]);
      // Clear bought items if new week
      const lastWeek=localStorage.getItem('fp_last_shopping_week');
      const thisWeek=wid();
      if(lastWeek&&lastWeek!==thisWeek){
        shoppingItems=shoppingItems.filter(i=>!i.done);
        await saveShoppingDB();
      }
      localStorage.setItem('fp_last_shopping_week',thisWeek);
    }
  }catch(e){console.log('Shopping fresh start');}
}

function subscribeShoppingDB(){
  if(!db)return;
  db.collection('fernanda').doc('shopping').onSnapshot(snap=>{
    if(snap.exists){
      shoppingItems=snap.data().items||[];
      renderSh();
    }
  });
}

function subscribeDB(){
  if(unsub)unsub();
  if(!db)return;
  unsub=db.collection('fernanda').doc(wid()).onSnapshot(snap=>{
    if(snap.exists){
      weekData=snap.data();
      renderDay();
      renderSh();
    }
  });
}

async function loadDB(){
  if(!db)return;
  try{
    const snap=await db.collection('fernanda').doc(wid()).get();
    if(snap.exists)weekData=snap.data();
  }catch(e){console.log('Fresh start');}
}

// ── RENDER ─────────────────────────────────
function setWeekRange(){
  document.getElementById('week-range').textContent='Semana '+weekDays[0].getDate()+' de '+MES[weekDays[0].getMonth()]+' — '+weekDays[6].getDate()+' de '+MES[weekDays[6].getMonth()];
}

function buildNav(){
  const nav=document.getElementById('wk-nav');nav.innerHTML='';
  weekDays.forEach((d,i)=>{
    const isT=dk(d)===dk(today);const isA=dk(d)===dk(activeDate);
    const dt=tasksForDay(i);const df=focusForDay(i);
    const has=dt.filter(t=>t.addedOnDay===i).length>0||df[1]||df[2]||df[3]||((weekData.events||{})[i]&&weekData.events[i].length>0)||(gcalEvts[dk(d)]&&gcalEvts[dk(d)].length>0);
    const btn=document.createElement('div');
    btn.className='wk-btn'+(isA?' active':'')+(isT?' istoday':'')+(has?' has-data':'');
    btn.innerHTML='<span class="wdn">'+DS[d.getDay()]+'</span><span class="wdnum">'+d.getDate()+'</span><span class="wdot"></span>';
    btn.onclick=()=>{activeDate=new Date(d);document.getElementById('ev-date').value=dk(d);renderDay();};
    nav.appendChild(btn);
  });
}

function buildOv(){
  const ov=document.getElementById('wkov');ov.innerHTML='';
  weekDays.forEach((d,i)=>{
    const isT=dk(d)===dk(today);
    const col=document.createElement('div');col.className='wcol';
    const n=document.createElement('div');n.className='wovn'+(isT?' today':'');n.textContent=DS[d.getDay()];col.appendChild(n);
    const w=dayWo(i);
    if(w.wo1){const t=document.createElement('div');t.className='wtag wwo';t.textContent=emoji(w.wo1,WE);col.appendChild(t);}
    if(w.wo2){const t=document.createElement('div');t.className='wtag wwo';t.textContent=emoji(w.wo2,WE);col.appendChild(t);}
    if(w.ha1){const t=document.createElement('div');t.className='wtag whb';t.textContent=emoji(w.ha1,HE);col.appendChild(t);}
    if(w.ha2){const t=document.createElement('div');t.className='wtag whb';t.textContent=emoji(w.ha2,HE);col.appendChild(t);}
    const evs=[...(gcalEvts[dk(d)]||[]),...dayEvts(i)];
    evs.slice(0,2).forEach(ev=>{const t=document.createElement('div');t.className='wtag wev';t.textContent=ev.title;col.appendChild(t);});
    tasksForDay(i).filter(t=>t.addedOnDay===i).slice(0,3).forEach(t=>{
      const el=document.createElement('div');el.className='wtsk'+(t.doneOnDay!==undefined?' done-task':'');el.textContent=t.text;col.appendChild(el);
    });
    ov.appendChild(col);
  });
}

function renderDay(){
  const di=dayIdx();
  document.getElementById('active-date').textContent=DIAS[activeDate.getDay()]+', '+activeDate.getDate()+' de '+MES[activeDate.getMonth()];
  setWeekRange();buildNav();buildOv();
  renderTasks(di);renderFocus(di);renderEvts(di);renderWo(di);updateProg(di);renderSh();
}

function renderTasks(di){
  const list=document.getElementById('task-list');list.innerHTML='';
  const tasks=tasksForDay(di);
  const carried=tasks.filter(t=>t.addedOnDay<di);
  const undoneCarried=carried.filter(t=>t.doneOnDay===undefined);
  const ch=document.getElementById('ch');
  if(undoneCarried.length){ch.style.display='block';ch.textContent=undoneCarried.length+' pendiente'+(undoneCarried.length>1?'s':'')+' sin completar del día anterior';}
  else ch.style.display='none';
  const own=tasks.filter(t=>t.addedOnDay===di);
  [...carried,...own].forEach(t=>{
    const isDone=t.doneOnDay!==undefined;const isCar=t.addedOnDay<di;
    const d=document.createElement('div');d.className='task-item'+(isCar?' carried':'');
    d.innerHTML='<div class="cb'+(isDone?' done':'')+'" data-id="'+t.id+'" onclick="toggleTask(this)"><svg class="ck" viewBox="0 0 8 8"><polyline points="1,4 3,6 7,2" fill="none" stroke="white" stroke-width="1.5"/></svg></div><span class="tt'+(isDone?' done':'')+'">'+t.text+'</span>'+(isCar&&!isDone?'<span class="cbadge">↩ anterior</span>':'')+'<button class="dx" data-id="'+t.id+'" onclick="deleteTask(this)">×</button>';
    list.appendChild(d);
  });
}

function updateProg(di){
  const tasks=tasksForDay(di);const done=tasks.filter(t=>t.doneOnDay!==undefined).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent='Progreso del día: '+pct+'%';
}

function toggleTask(el){
  const id=el.dataset.id;const di=dayIdx();
  const t=(weekData.tasks||[]).find(t=>t.id===id);if(!t)return;
  if(t.doneOnDay!==undefined){delete t.doneOnDay;}else{t.doneOnDay=di;}
  saveDB();renderTasks(di);updateProg(di);buildNav();buildOv();
}
function deleteTask(el){
  const id=el.dataset.id;const di=dayIdx();
  const t=(weekData.tasks||[]).find(t=>t.id===id);if(t)t.deletedOnDay=di;
  saveDB();renderTasks(di);updateProg(di);buildNav();buildOv();
}
function addTask(){
  const inp=document.getElementById('task-in');const v=inp.value.trim();if(!v)return;
  const di=dayIdx();if(!weekData.tasks)weekData.tasks=[];
  weekData.tasks.push({id:'t'+Date.now(),text:v,addedOnDay:di});
  saveDB();renderTasks(di);buildNav();inp.value='';
}

function renderFocus(di){
  const f=focusForDay(di);
  [1,2,3].forEach(n=>{
    const doneKey=di+'_'+n;
    fdone[n]=!!(weekData.focusDone&&weekData.focusDone[doneKey]!==undefined);
    const s=document.getElementById('fs'+n);if(s)s.querySelector('input').value='';
  });
  renderBubbles(di);
}

function makeBubble(inp,num){
  const v=inp.value.trim();
  if(!v)return;
  const di=dayIdx();
  if(!weekData.focus)weekData.focus={};
  if(!weekData.focus[di])weekData.focus[di]={};
  weekData.focus[di][num]=v;
  inp.value='';
  saveDB();
  renderBubbles(di);
  buildNav();
}

function renderBubbles(di){
  const c=document.getElementById('fbubb');c.innerHTML='';
  const f=focusForDay(di);
  [1,2,3].forEach(n=>{
    if(f[n]){
      const b=document.createElement('div');
      b.className='fbub'+(fdone[n]?' tachado':'');
      b.setAttribute('data-n',n);
      b.setAttribute('data-di',di);
      b.setAttribute('onclick','toggleFdone(parseInt(this.dataset.n),parseInt(this.dataset.di))');
      b.innerHTML=f[n]+'<span style="font-size:11px;margin-left:4px;" data-n="'+n+'" onclick="event.stopPropagation();delFocus(this)">✕</span>';
      c.appendChild(b);
      const s=document.getElementById('fs'+n);if(s)s.style.display='none';
    } else {
      const s=document.getElementById('fs'+n);if(s){s.style.display='block';s.querySelector('input').value='';}
    }
  });
}

function toggleFdone(num,di){
  if(!weekData.focusDone)weekData.focusDone={};
  const k=di+'_'+num;
  if(weekData.focusDone[k]!==undefined){delete weekData.focusDone[k];fdone[num]=false;}
  else{weekData.focusDone[k]=di;fdone[num]=true;}
  saveDB();renderBubbles(di);
}

function delFocus(el){
  const num=parseInt(el.dataset.n);
  const di=dayIdx();
  if(!weekData.focus)weekData.focus={};
  if(!weekData.focus[di])weekData.focus[di]={};
  weekData.focus[di][num]='';
  fdone[num]=false;
  saveDB();renderBubbles(di);buildNav();
}

function renderEvts(di){
  const list=document.getElementById('ev-list');
  const gcal=(gcalEvts[dk(weekDays[di])]||[]).map(e=>({...e,src:'gcal'}));
  const manual=dayEvts(di).map((e,i)=>({...e,src:'manual',idx:i}));
  const ts=t=>{if(!t||t==='Todo el día')return -1;const p=t.includes('PM');const pts=t.replace(/AM|PM/,'').trim().split(':');let h=parseInt(pts[0]);if(p&&h!==12)h+=12;if(!p&&h===12)h=0;return h*60+parseInt(pts[1]||0);};
  const all=[...gcal,...manual].sort((a,b)=>ts(a.time)-ts(b.time));
  list.innerHTML='';
  if(!all.length){list.innerHTML='<div class="ev-empty">Sin eventos para este día</div>';return;}
  all.forEach(ev=>{
    const d=document.createElement('div');d.className='ev-item';
    let del='';
    if(ev.src==='manual')del='<button class="ev-del" data-idx="'+ev.idx+'" data-di="'+di+'" onclick="delManualEv(this)">×</button>';
    else if(ev.src==='gcal'&&ev.gcalId)del='<button class="ev-del" data-gid="'+ev.gcalId+'" onclick="delGCalEv(this)">×</button>';
    d.innerHTML='<div class="ev-time">'+ev.time+'</div><div class="ev-dot"></div><div class="ev-title">'+ev.title+'</div>'+del;
    list.appendChild(d);
  });
}

function delManualEv(el){
  const idx=parseInt(el.dataset.idx);const di=parseInt(el.dataset.di);
  if(weekData.events&&weekData.events[di])weekData.events[di].splice(idx,1);
  saveDB();renderEvts(di);buildOv();
}

async function delGCalEv(el){
  const gid=el.dataset.gid;if(!gcalToken||!gid)return;
  if(!confirm('¿Eliminar este evento de Google Calendar?'))return;
  try{
    await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/'+gid,{method:'DELETE',headers:{Authorization:'Bearer '+gcalToken}});
    setTimeout(()=>fetchGCal(),500);
  }catch(e){console.error(e);}
}

function addEv(){
  const dateIn=document.getElementById('ev-date');
  const h=document.getElementById('ev-h').value;
  const m=document.getElementById('ev-m').value;
  const ap=document.getElementById('ev-ap').value;
  const titleIn=document.getElementById('ev-title');
  if(!titleIn.value.trim())return;
  const targetDate=dateIn.value||dk(activeDate);
  const tdi=weekDays.findIndex(d=>dk(d)===targetDate);
  if(tdi<0)return;
  if(!weekData.events)weekData.events={};
  if(!weekData.events[tdi])weekData.events[tdi]=[];
  weekData.events[tdi].push({time:h+':'+m+' '+ap,title:titleIn.value.trim()});
  saveDB();
  if(gcalToken&&targetDate)createGCalEv(titleIn.value.trim(),targetDate,h,m,ap);
  const di=dayIdx();renderEvts(di);buildNav();buildOv();titleIn.value='';
  if(tdi!==di){
    document.getElementById('gcal-note').textContent='Guardado para el '+DIAS[weekDays[tdi].getDay()]+' '+weekDays[tdi].getDate();
    setTimeout(()=>document.getElementById('gcal-note').textContent='',3000);
  }
}

function renderWo(di){
  const w=dayWo(di);
  document.getElementById('wo1').value=w.wo1||'';document.getElementById('wo2').value=w.wo2||'';
  document.getElementById('ha1').value=w.ha1||'';document.getElementById('ha2').value=w.ha2||'';

  weekData.workout[di]={wo1:document.getElementById('wo1').value,wo2:document.getElementById('wo2').value,ha1:document.getElementById('ha1').value,ha2:document.getElementById('ha2').value};

// ── GOOGLE CALENDAR ────────────────────────
function initGCal(){
  if(typeof google==='undefined'){setTimeout(initGCal,500);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GCAL_ID,
    scope:'https://www.googleapis.com/auth/calendar',
    prompt:'',
    callback:(res)=>{
      if(res.error){
        // If silent refresh failed, try with consent
        if(res.error==='interaction_required'||res.error==='consent_required'){
          tokenClient.requestAccessToken({prompt:'consent'});
        }
        return;
      }
      gcalToken=res.access_token;
      localStorage.setItem('gct',gcalToken);
      // Store expiry time (tokens last 1hr, refresh at 50min)
      localStorage.setItem('gct_exp', Date.now() + 50*60*1000);
      setGCalConnected();
      fetchGCal();
      // Schedule silent refresh before expiry
      setTimeout(()=>tokenClient.requestAccessToken({prompt:''}), 50*60*1000);
    }
  });
  // Try silent refresh on load
  const saved=localStorage.getItem('gct');
  const exp=parseInt(localStorage.getItem('gct_exp')||'0');
  if(saved){
    gcalToken=saved;
    setGCalConnected();
    fetchGCal();
    if(exp>0){
      const msLeft=exp-Date.now();
      if(msLeft>0){
        // Token still valid - schedule refresh
        setTimeout(()=>tokenClient.requestAccessToken({prompt:''}), Math.max(msLeft,0));
      } else {
        // Expired - silent refresh
        tokenClient.requestAccessToken({prompt:''});
      }
    }
  }
}

function setGCalConnected(){
  const btn=document.getElementById('gcal-btn');
  btn.textContent='✓ Google Calendar';btn.classList.add('connected');
}

function handleGCal(){
  if(gcalToken){fetchGCal();}
  else if(tokenClient){tokenClient.requestAccessToken({prompt:'consent'});}
}

async function fetchGCal(){
  if(!gcalToken)return;
  try{
    const s=new Date(weekDays[0]);s.setHours(0,0,0,0);
    const e=new Date(weekDays[6]);e.setHours(23,59,59,999);
    const url='https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='+s.toISOString()+'&timeMax='+e.toISOString()+'&singleEvents=true&orderBy=startTime';
    const r=await fetch(url,{headers:{Authorization:'Bearer '+gcalToken}});
    if(r.status===401){gcalToken=null;localStorage.removeItem('gct');if(tokenClient)tokenClient.requestAccessToken({prompt:''});return;}
    const data=await r.json();
    gcalEvts={};
    (data.items||[]).forEach(ev=>{
      const start=ev.start.dateTime||ev.start.date;
      const jd=new Date(start);
      const key=dk(jd);
      const isAll=!ev.start.dateTime;
      const h=jd.getHours();const mn=String(jd.getMinutes()).padStart(2,'0');
      const ap=h>=12?'PM':'AM';const h12=h===0?12:h>12?h-12:h;
      const ts=isAll?'Todo el día':h12+':'+mn+' '+ap;
      if(!gcalEvts[key])gcalEvts[key]=[];
      gcalEvts[key].push({time:ts,title:ev.summary||'(sin título)',gcalId:ev.id,sort:jd.getTime()});
    });
    Object.keys(gcalEvts).forEach(k=>gcalEvts[k].sort((a,b)=>a.sort-b.sort));
    renderEvts(dayIdx());buildOv();buildNav();
    document.getElementById('gcal-note').textContent='Google Calendar sincronizado ✓';
  }catch(e){
    console.error(e);
    document.getElementById('gcal-note').textContent='Error al cargar calendario';
  }
}

async function createGCalEv(title,date,hour,min,ampm){
  if(!gcalToken)return;
  let h=parseInt(hour);
  if(ampm==='PM'&&h!==12)h+=12;if(ampm==='AM'&&h===12)h=0;
  const s=new Date(date+'T'+String(h).padStart(2,'0')+':'+min+':00');
  const ev={summary:title,start:{dateTime:s.toISOString(),timeZone:'America/Merida'},end:{dateTime:new Date(s.getTime()+3600000).toISOString(),timeZone:'America/Merida'}};
  try{
    await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',headers:{Authorization:'Bearer '+gcalToken,'Content-Type':'application/json'},body:JSON.stringify(ev)});
    setTimeout(()=>fetchGCal(),1000);
  }catch(e){console.error(e);}
}

// ── WEATHER ────────────────────────────────
async function fetchWeather(){
  try{
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.62&current=temperature_2m,precipitation_probability,weathercode&timezone=America/Merida');
    const d=await r.json();
    const temp=Math.round(d.current.temperature_2m);
    const pre=d.current.precipitation_probability;
    const code=d.current.weathercode;
    document.getElementById('temp').textContent=temp+'°C';
    const ds={0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',45:'Neblina',51:'Llovizna',61:'Lluvia ligera',63:'Lluvia moderada',65:'Lluvia fuerte',80:'Chubascos',95:'Tormenta'};
    document.getElementById('wdesc').textContent=(ds[code]||'Variable')+' — se siente '+(temp+4)+'°C';
    const rain=pre>40||[51,53,55,61,63,65,80,81,95].includes(code);
    document.getElementById('rain').textContent=rain?'Lluvia probable ('+pre+'%)':'Sin lluvia hoy';
  }catch(e){
    document.getElementById('temp').textContent='32°C';
    document.getElementById('wdesc').textContent='Soleado — se siente 36°C';
    document.getElementById('rain').textContent='Sin lluvia hoy';
  }
}
